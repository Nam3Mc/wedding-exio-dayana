Sí. Revisé todos los archivos publicados del repositorio. Hay dos fallos principales diferentes: uno en tu copia local y otro en el despliegue de Vercel.

1. El error local de "type": "module"
El package.json declara:

"type": "module"
Por lo tanto, todo archivo .js debe utilizar:

import express from 'express';
y no:

const express = require('express');
En la versión actual de GitHub, api/index.js, auth.js, db.js y las rutas ya usan correctamente import y export. Por eso, el error que mostraste anteriormente indica que tu archivo local no es igual al que está actualmente en la rama main, probablemente porque todavía contiene un require() en la primera línea. 

Compruébalo con:

git status
git branch --show-current
git fetch origin
git diff origin/main -- package.json api/index.js api/auth.js api/db.js
Luego actualiza:

git pull --rebase origin main
pnpm install
pnpm dev
No necesitas cambiar "type": "module" ni renombrar los archivos a .cjs. La versión actual del repositorio está diseñada para ES Modules.

2. La configuración de Vercel está desactivada
El archivo vercel.json tiene todas sus líneas comentadas:

// {
//     ...
// }
Eso significa que no existe ninguna configuración activa de rutas. El archivo tampoco constituye un objeto JSON válido con la configuración esperada por Vercel. 

Al mismo tiempo, el frontend llama rutas como:

/api/auth/login
/api/invitations
/api/public/invitation/:uuid
pero no hay una regla activa que dirija esas solicitudes hacia la aplicación Express. 

El problema de api/index.js
Vercel reconoce automáticamente una aplicación Express completa cuando su entrypoint está en ubicaciones como:

index.js

api/index.js
Esa ubicación puede funcionar como una función individual /api, pero no convierte automáticamente /api/auth/login, /api/invitations, etc. en rutas del mismo servidor Express sin una configuración adicional.

No existe:

El archivo _redirects no resuelve esto en Vercel. La configuración de reescrituras de Vercel debe realizarse mediante vercel.json.

El servidor requiere estas tres variables:

import jwt from 'jsonwebtoken';

const authMiddleware = (req, res, next) => {
  const authHeader = req.headers.authorization;
  if (!authHeader) {
    return res.status(401).json({ error: 'Acceso denegado: token no proporcionado' });
  }

  // El formato esperado: "Bearer <token>"
  const token = authHeader.split(' ')[1];
  if (!token) {
    return res.status(401).json({ error: 'Token no válido' });
  }

  try {
    const decoded = jwt.verify(token, process.env.JWT_SECRET);
    req.user = decoded; // Podemos guardar información del usuario si se necesita
    next();
  } catch (error) {
    if (error.name === 'TokenExpiredError') {
      return res.status(403).json({ error: 'Token expirado' });
    }
    return res.status(403).json({ error: 'Token inválido' });
  }
};

export default authMiddleware;

import { Router } from 'express';

export default (pool) => {
  const router = Router();

  // GET: Obtener datos de una invitación (público)
  router.get('/invitation/:uuid', async (req, res) => {
    const { uuid } = req.params;
    try {
      // Buscar la invitación
      const invResult = await pool.query(
        'SELECT * FROM invitations WHERE id = $1',
        [uuid]
      );
      if (invResult.rowCount === 0) {
        return res.status(404).json({ error: 'Invitación no encontrada' });
      }
      const invitation = invResult.rows[0];

      // Verificar si expiró (si está PENDING y la fecha ya pasó)
      const now = new Date();
      const expiration = new Date(invitation.expiration_date);
      if (invitation.group_status === 'PENDING' && now > expiration) {
        // Actualizar estado a EXPIRED
        await pool.query(
          'UPDATE invitations SET group_status = $1 WHERE id = $2',
          ['EXPIRED', uuid]
        );
        invitation.group_status = 'EXPIRED';
      }

      // Obtener familiares
      const familyResult = await pool.query(
        'SELECT id, name, is_attending FROM family_members WHERE invitation_id = $1',
        [uuid]
      );

      res.json({
        invitation: {
          id: invitation.id,
          primary_guest: invitation.primary_guest,
          is_foreign: invitation.is_foreign,
          expiration_date: invitation.expiration_date,
          group_status: invitation.group_status,
          max_attendees: invitation.max_attendees,
        },
        family_members: familyResult.rows
      });
    } catch (error) {
      console.error('Error al obtener invitación pública:', error);
      res.status(500).json({ error: 'Error al obtener invitación' });
    }
  });

  // POST: Enviar respuesta (confirmar asistentes)
  router.post('/respond', async (req, res) => {
    const { uuid, responses } = req.body;
    if (!uuid || !Array.isArray(responses)) {
      return res.status(400).json({ error: 'Datos inválidos' });
    }

    const client = await pool.connect();
    try {
      await client.query('BEGIN');

      // Verificar que la invitación existe y no está expirada
      const invResult = await client.query(
        'SELECT id, group_status, expiration_date FROM invitations WHERE id = $1',
        [uuid]
      );
      if (invResult.rowCount === 0) {
        await client.query('ROLLBACK');
        return res.status(404).json({ error: 'Invitación no encontrada' });
      }
      const invitation = invResult.rows[0];
      const now = new Date();
      const expiration = new Date(invitation.expiration_date);
      if (invitation.group_status === 'PENDING' && now > expiration) {
        await client.query('ROLLBACK');
        return res.status(410).json({ error: 'La invitación ha expirado' });
      }

      // Actualizar cada familiar
      for (const resp of responses) {
        await client.query(
          'UPDATE family_members SET is_attending = $1 WHERE id = $2 AND invitation_id = $3',
          [resp.is_attending, resp.id, uuid]
        );
      }

      // Calcular nuevo estado del grupo
      const stats = await client.query(
        SELECT 
          COUNT(*) AS total,
          COUNT(*) FILTER (WHERE is_attending = true) AS attending,
          COUNT(*) FILTER (WHERE is_attending = false OR is_attending IS NULL) AS not_attending
         FROM family_members WHERE invitation_id = $1,
        [uuid]
      );
      const { total, attending, not_attending } = stats.rows[0];
      let newStatus = 'PENDING';
      if (attending > 0) {
        newStatus = 'CONFIRMED';
      } else if (not_attending === total && total > 0) {
        newStatus = 'REJECTED';
      }

      await client.query(
        'UPDATE invitations SET group_status = $1, updated_at = NOW() WHERE id = $2',
        [newStatus, uuid]
      );

      await client.query('COMMIT');
      res.json({
        message: 'Respuesta guardada correctamente',
        status: newStatus
      });
    } catch (error) {
      await client.query('ROLLBACK');
      console.error('Error al procesar respuesta:', error);
      res.status(500).json({ error: 'Error al procesar respuesta' });
    } finally {
      client.release();
    }
  });

  return router;
};

export default (pool, auth) => {
  const router = Router();

  // GET: Listar todas las invitaciones con conteos
  router.get('/', async (req, res) => {
    try {
      const query = 
        SELECT 
          i.id,
          i.primary_guest,
          i.is_foreign,
          i.expiration_date,
          i.group_status,
          i.created_at,
          i.updated_at,
          i.max_attendees,
          COALESCE(
            (SELECT COUNT(*) FROM family_members fm WHERE fm.invitation_id = i.id AND fm.is_attending = true),
            0
          ) AS confirmed_attendees,
          COALESCE(
            (SELECT COUNT(*) FROM family_members fm WHERE fm.invitation_id = i.id),
            0
          ) AS total_family_members
        FROM invitations i
        ORDER BY i.created_at DESC
      ;
      const { rows } = await pool.query(query);
      res.json(rows);
    } catch (error) {
      console.error('Error al obtener invitaciones:', error);
      res.status(500).json({ error: 'Error al obtener invitaciones' });
    }
  });

  // POST: Crear nueva invitación
  router.post('/', async (req, res) => {
    const { primary_guest, family_members, is_foreign, expiration_date, max_attendees } = req.body;

    // Validaciones básicas
    if (!primary_guest || !family_members || !expiration_date) {
      return res.status(400).json({ error: 'Faltan campos requeridos' });

    if (!Array.isArray(family_members) || family_members.length === 0) {
      return res.status(400).json({ error: 'Debe incluir al menos un familiar' });
    }

    const client = await pool.connect();
    try {
      await client.query('BEGIN');

      // Insertar invitación

      const values = [

        expiration_date,

      ];

Veredicto
El proyecto todavía no está listo para deployment, aunque la base general está bien construida. Hay varios bloqueos de Vercel y tres errores importantes en la lógica de confirmación.

El deployment actual devuelve 404 en la raíz, lo cual coincide con la configuración incompleta del repositorio. 

Problemas que bloquean Vercel
1. api/index.js está en una ubicación incorrecta para Express
La detección actual de aplicaciones Express en Vercel busca el entrypoint en:

index.js
app.js
server.js
src/index.js
src/app.js
src/server.js
Tu servidor está en:

api/index.js
Por eso Vercel no lo reconoce automáticamente como una aplicación Express completa. Debemos moverlo a la raíz:

index.js
y cambiar los imports a:

import pool from './api/db.js';
import auth from './api/auth.js';
import adminRoutes from './api/routes/admin.js';
import publicRoutes from './api/routes/public.js';
Vercel exige además que la aplicación sea exportada por defecto, parte que actualmente sí tienes correctamente. 

2. vercel.json no es JSON válido
Todo el archivo está comentado:

// {
//     ...
// }
JSON no permite comentarios, así que Vercel no está recibiendo ninguna regla de rutas. 

El archivo debe quedar así:

{
    "$schema": "https://openapi.vercel.sh/vercel.json",
    "rewrites": [
        {
            "source": "/",
            "destination": "/admin.html"
        },
        {
            "source": "/invitation/:uuid",
            "destination": "/invitation.html"
        }
    ],
    "headers": [
        {
            "source": "/(.*)",
            "headers": [
                {
                    "key": "X-Content-Type-Options",
                    "value": "nosniff"
                },
                {
                    "key": "X-Frame-Options",
                    "value": "DENY"
                },
                {
                    "key": "Referrer-Policy",
                    "value": "strict-origin-when-cross-origin"
                }
            ]
        }
    ]
}
Los rewrites conservan la URL visible mientras sirven otro archivo internamente. 

3. _redirects no debe usarse
Tienes:

public/_redirects
con:

/invitation/* /invitation.html 200
Ese archivo pertenece al sistema de redirects usado por otros proveedores y no configura las rutas de Vercel. La regla debe estar en vercel.json. Puedes eliminar _redirects. 

4. express.static() será ignorado en producción
Actualmente tienes:

app.use(express.static(path.join(__dirname, '../public')));
Esto sirve para ejecutar el proyecto localmente, pero Vercel ignora express.static() y sirve directamente el contenido de public mediante su CDN. Por eso necesitamos los rewrites anteriores. 

Puedes mantener express.static() para desarrollo local, pero no debes depender de él para el deployment.

Errores importantes en la lógica
5. La opción VIRTUAL nunca se guarda
invitation.html envía:

{
    uuid,
    responses,
    status: 'VIRTUAL'
}
Pero el backend solamente recibe:

const { uuid, responses } = req.body;
El campo status es ignorado. Después el backend calcula únicamente:

if (attending > 0) {
    newStatus = 'CONFIRMED';
}
Por lo tanto, una respuesta virtual termina guardada como CONFIRMED. El estado VIRTUAL que muestras en el panel administrativo nunca será generado por este endpoint. 

 

El backend debe recibir y validar:

const { uuid, responses, status } = req.body;

const allowedStatuses = ['CONFIRMED', 'VIRTUAL', 'REJECTED'];

if (!allowedStatuses.includes(status)) {
    return res.status(400).json({
        error: 'Estado de confirmación inválido'
    });
}
6. El invitado principal no se registra como asistente
En el modal, el invitado principal aparece seleccionado:

<input
    type="checkbox"
    id="modal_check_principal"
    checked
    disabled
>
Pero después el JavaScript excluye los inputs deshabilitados:

input[type="checkbox"]:not([disabled])
Por tanto, el backend solamente recibe las respuestas de los acompañantes. El invitado principal nunca queda almacenado como asistente. 


La solución más sencilla es considerar que:

CONFIRMED: el invitado principal asistirá presencialmente.

VIRTUAL: el invitado principal asistirá virtualmente.

REJECTED: el invitado principal no asistirá.

El group_status debe establecerse usando el status recibido, no calculándolo solamente con los acompañantes.

7. Una invitación expirada todavía puede responderse
El endpoint comprueba:

if (
    invitation.group_status === 'PENDING' &&
    now > expiration
) {
    return res.status(410);
}
Si la invitación ya tiene el estado EXPIRED, la condición es falsa porque ya no es PENDING. En consecuencia, alguien podría llamar directamente al endpoint y cambiar una invitación expirada a CONFIRMED o REJECTED. 

Debe validarse así:

if (invitation.group_status === 'EXPIRED') {
    await client.query('ROLLBACK');

    return res.status(410).json({
        error: 'La invitación ha expirado'
    });
}
Además, si solamente se permite una respuesta:

if (invitation.group_status !== 'PENDING') {
    await client.query('ROLLBACK');

    return res.status(409).json({
        error: 'Esta invitación ya fue respondida'
    });
}
8. La fecha expira al comenzar el día
El administrador envía:

2026-08-01
El backend crea:

new Date(invitation.expiration_date);
Eso normalmente representa el inicio del día. La invitación podría expirar a las 00:00, aunque el usuario entienda que tiene todo el día para responder.

Es más seguro manejar expiration_date como DATE de PostgreSQL y comparar:

expiration_date <
    (CURRENT_TIMESTAMP AT TIME ZONE 'America/Bogota')::date
Así expirará cuando la fecha seleccionada ya haya terminado.

Problema de seguridad en los HTML
Los nombres guardados en PostgreSQL se insertan directamente usando innerHTML:

<td><strong>${inv.primary_guest}</strong></td>

<body>

    <!-- ===================== TOAST ===================== -->
    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <!-- ===================== LOADER ===================== -->
    <div id="loaderInicial" class="loader">
        <i class="fas fa-spinner"></i>
        Cargando invitación...
    </div>

    <!-- ===================== SOBRE MODAL ===================== -->
    <div class="sobre-overlay hidden" id="sobreOverlay" aria-hidden="true">
        <div class="sobre" id="sobreBtn" role="button" tabindex="0" aria-label="Abrir invitación">
            <h2>Dayana & Exio</h2>
            <p>Toca para abrir tu invitación</p>
            <div class="flecha"><i class="fas fa-chevron-down"></i></div>
        </div>
    </div>

    <!-- ===================== INVITACIÓN ===================== -->
    <div class="invitacion-container" id="invitacionContainer">
        <div class="marco-invitacion" id="marcoInvitacion">
            <div id="invitacionContent"></div>
        </div>
    </div>

    <!-- ===================== MODAL FLOTANTE DE CONFIRMACIÓN ===================== -->
    <div class="modal-confirmacion-overlay" id="modalConfirmacion" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-confirmacion">
            <button type="button" class="cerrar-modal" id="cerrarModalConfirmacion" aria-label="Cerrar">&times;</button>
            <div class="icono-agradecimiento"><i class="fas fa-heart"></i></div>
            <h2 id="modalTitle">Confirma tu asistencia</h2>
            <p class="mensaje-agradecimiento" id="modalMessage">Nos llena de alegría que nos acompañes en este día especial.</p>
            <p class="instruccion" id="modalInstruction">Selecciona quiénes de tu grupo asistirán:</p>
            <div id="modalListaCheckboxes" class="lista-checkboxes">
                <!-- Se llena dinámicamente -->
            </div>
            <div class="acciones-modal">
                <button type="button" class="btn btn-calendario" id="btnCalendarioModal" hidden>
                    <i class="fas fa-calendar-plus"></i> Agregar a mi calendario
                </button>
                <button type="button" class="btn btn-confirmar" id="btnConfirmarModal" style="background:var(--verde-salvia); color:var(--azul-marino);">
                    <i class="fas fa-check"></i> Confirmar asistencia
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==============================================================
        // CONFIGURACIÓN
        // ==============================================================
        const CONFIG = Object.freeze({
            API_BASE: '',
            WEDDING_START: '2027-01-08T18:00:00-05:00',
            WEDDING_END: '2027-01-08T22:00:00-05:00',
            REQUEST_TIMEOUT_MS: 15000
        });

        const RESPONSE_STATUS = Object.freeze({
            PENDING: 'PENDING',
            CONFIRMED: 'CONFIRMED',
            VIRTUAL: 'VIRTUAL',
            REJECTED: 'REJECTED',
            EXPIRED: 'EXPIRED'
        });

        // ==============================================================
        // ELEMENTOS Y ESTADO
        // ==============================================================
        const elements = {
            loader: document.getElementById('loaderInicial'),
            envelopeOverlay: document.getElementById('sobreOverlay'),
            envelopeButton: document.getElementById('sobreBtn'),
            invitationContainer: document.getElementById('invitacionContainer'),
            invitationContent: document.getElementById('invitacionContent'),
            toastContainer: document.getElementById('toastContainer'),
            modal: document.getElementById('modalConfirmacion'),
            modalTitle: document.getElementById('modalTitle'),
            modalMessage: document.getElementById('modalMessage'),
            modalInstruction: document.getElementById('modalInstruction'),
            modalList: document.getElementById('modalListaCheckboxes'),
            modalCloseButton: document.getElementById('cerrarModalConfirmacion'),
            modalCalendarButton: document.getElementById('btnCalendarioModal'),
            modalConfirmButton: document.getElementById('btnConfirmarModal')
        };

        let invitationData = null;
        let invitationId = null;
        let envelopeOpened = false;
        let pendingResponseStatus = null;
        let countdownIntervalId = null;
        let lastFocusedElement = null;
        let isSubmitting = false;

        // ==============================================================
        // UTILIDADES
        // ==============================================================
        function normalizeText(value) {
            return typeof value === 'string' ? value.trim() : '';
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function showToast(message, type = 'info', duration = 4000) {
            const allowedTypes = new Set(['success', 'error', 'info']);
            const safeType = allowedTypes.has(type) ? type : 'info';
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            const toast = document.createElement('div');
            toast.className = `toast ${safeType}`;
            toast.setAttribute('role', safeType === 'error' ? 'alert' : 'status');

            const icon = document.createElement('i');
            icon.className = `fas ${iconMap[safeType]}`;
            icon.setAttribute('aria-hidden', 'true');

            const text = document.createElement('span');
            text.textContent = String(message ?? '');

            toast.append(icon, text);
            elements.toastContainer.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            window.setTimeout(() => {
                toast.classList.remove('show');

                window.setTimeout(() => {
                    toast.remove();
                }, 400);
            }, duration);
        }

        function getInvitationId() {
            const url = new URL(window.location.href);
            const queryId = normalizeText(url.searchParams.get('id'));

            if (queryId) {
                return queryId;
            }

            const segments = url.pathname
                .split('/')
                .map((segment) => segment.trim())
                .filter(Boolean);

            const invitationIndex = segments.findIndex(
                (segment) => segment.toLowerCase() === 'invitation'
            );

            if (invitationIndex >= 0 && segments[invitationIndex + 1]) {
                return decodeURIComponent(segments[invitationIndex + 1]);
            }

            return '';
        }

        function isValidInvitationId(value) {
            return /^[A-Za-z0-9_-]{1,128}$/.test(value);
        }

        async function fetchJson(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = window.setTimeout(() => {
                controller.abort();
            }, CONFIG.REQUEST_TIMEOUT_MS);

            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal,
                    headers: {
                        Accept: 'application/json',
                        ...(options.headers || {})
                    }
                });

                const responseText = await response.text();
                let data = {};

                if (responseText) {
                    try {
                        data = JSON.parse(responseText);
                    } catch {
                        data = {};
                    }
                }

                if (!response.ok) {
                    const error = new Error(
                        data.error || `La solicitud falló con estado ${response.status}`
                    );

                    error.status = response.status;
                    throw error;
                }

                return data;
            } catch (error) {
                if (error.name === 'AbortError') {
                    throw new Error(
                        'La solicitud tardó demasiado. Verifica tu conexión e inténtalo nuevamente.'
                    );
                }

                throw error;
            } finally {
                window.clearTimeout(timeoutId);
            }
        }

        function setOverlayVisibility(isVisible) {
            elements.envelopeOverlay.classList.toggle('hidden', !isVisible);
            elements.envelopeOverlay.setAttribute(
                'aria-hidden',
                String(!isVisible)
            );
        }

        function renderStateMessage({
            title,
            message,
            icon = 'fa-exclamation-circle'
        }) {
            elements.loader.hidden = false;
            elements.loader.replaceChildren();

            const wrapper = document.createElement('div');
            wrapper.className = 'error-state';

            const iconElement = document.createElement('i');
            iconElement.className = `fas ${icon}`;
            iconElement.setAttribute('aria-hidden', 'true');

            const heading = document.createElement('h2');
            heading.textContent = title;

            const paragraph = document.createElement('p');
            paragraph.textContent = message;

            wrapper.append(iconElement, heading, paragraph);
            elements.loader.appendChild(wrapper);
        }

        function setLoadingState(message = 'Cargando invitación...') {
            elements.loader.hidden = false;
            elements.loader.replaceChildren();

            const icon = document.createElement('i');
            icon.className = 'fas fa-spinner';
            icon.setAttribute('aria-hidden', 'true');

            const text = document.createTextNode(message);
            elements.loader.append(icon, text);
        }

        // ==============================================================
        // CALENDARIO
        // ==============================================================
        function formatUtcForCalendar(date) {
            return date
                .toISOString()
                .replace(/[-:]/g, '')
                .replace(/\.\d{3}Z$/, 'Z');
        }

        function generateCalendarFile() {
            const start = new Date(CONFIG.WEDDING_START);
            const end = new Date(CONFIG.WEDDING_END);
            const now = new Date();
            const uid = `boda-dayana-exio-${invitationId || 'invitado'}@wedding`;

            return [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//Dayana y Exio//Boda 2027//ES',
                'CALSCALE:GREGORIAN',
                'METHOD:PUBLISH',
                'BEGIN:VEVENT',
                `UID:${uid}`,
                `DTSTAMP:${formatUtcForCalendar(now)}`,
                `DTSTART:${formatUtcForCalendar(start)}`,
                `DTEND:${formatUtcForCalendar(end)}`,
                'SUMMARY:Boda de Dayana y Exio',
                'DESCRIPTION:Te esperamos en La Terraza del Portón, Cúcuta. ¡Celebremos juntos!',
                'LOCATION:La Terraza del Portón, Cúcuta',
                'END:VEVENT',
                'END:VCALENDAR'
            ].join('\r\n');
        }

        function downloadCalendar() {
            const content = generateCalendarFile();
            const blob = new Blob([content], {
                type: 'text/calendar;charset=utf-8'
            });
            const objectUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');

            link.href = objectUrl;
            link.download = 'boda_dayana_exio.ics';
            link.hidden = true;

            document.body.appendChild(link);
            link.click();
            link.remove();

            URL.revokeObjectURL(objectUrl);
            showToast('El evento se agregó a tu archivo de calendario.', 'success');
        }

        // ==============================================================
        // CARGA DE LA INVITACIÓN
        // ==============================================================
        function validateInvitationPayload(data) {
            return Boolean(
                data &&
                typeof data === 'object' &&
                data.invitation &&
                typeof data.invitation === 'object'
            );
        }

        async function loadInvitation({ showEnvelope = true } = {}) {
            if (!invitationId) {
                invitationId = getInvitationId();
            }

            if (!invitationId || !isValidInvitationId(invitationId)) {
                setOverlayVisibility(false);
                elements.invitationContainer.classList.remove('active');

                renderStateMessage({
                    title: 'Enlace de invitación inválido',
                    message: 'El enlace no contiene un código de invitación válido.'
                });

                return;
            }

            if (showEnvelope) {
                setLoadingState();
            }

            try {
                const encodedId = encodeURIComponent(invitationId);
                const data = await fetchJson(
                    `${CONFIG.API_BASE}/api/public/invitation/${encodedId}`,
                    {
                        method: 'GET',
                        cache: 'no-store'
                    }
                );

                if (!validateInvitationPayload(data)) {
                    throw new Error(
                        'El servidor devolvió una invitación con formato inválido.'
                    );
                }

                invitationData = {
                    invitation: data.invitation,
                    family_members: Array.isArray(data.family_members)
                        ? data.family_members
                        : []
                };

                const status = normalizeStatus(
                    invitationData.invitation.group_status
                );

                if (status === RESPONSE_STATUS.EXPIRED) {
                    setOverlayVisibility(false);
                    elements.invitationContainer.classList.remove('active');

                    renderStateMessage({
                        title: 'Invitación expirada',
                        message: 'El tiempo para confirmar esta invitación ha terminado.',
                        icon: 'fa-clock'
                    });

                    return;
                }

                elements.loader.hidden = true;

                if (showEnvelope && !envelopeOpened) {
                    setOverlayVisibility(true);
                    elements.invitationContainer.classList.remove('active');
                    elements.envelopeButton.focus();
                    return;
                }

                setOverlayVisibility(false);
                elements.invitationContainer.classList.add('active');
                renderInvitation(invitationData);
            } catch (error) {
                setOverlayVisibility(false);
                elements.invitationContainer.classList.remove('active');

                let title = 'No fue posible cargar la invitación';
                let message = error.message;

                if (error.status === 404) {
                    title = 'Invitación no encontrada';
                    message = 'Verifica que el enlace esté completo y sea correcto.';
                } else if (error.status === 410) {
                    title = 'Invitación expirada';
                    message = 'El tiempo para confirmar esta invitación ha terminado.';
                }

                renderStateMessage({
                    title,
                    message
                });

                showToast(message, 'error');
            }
        }

        function openEnvelope() {
            if (!invitationData || envelopeOpened) {
                return;
            }

            envelopeOpened = true;
            setOverlayVisibility(false);
            elements.invitationContainer.classList.add('active');
            renderInvitation(invitationData);

            window.requestAnimationFrame(() => {
                elements.invitationContainer.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            });
        }

        // ==============================================================
        // RENDER DE LA INVITACIÓN
        // ==============================================================
        function normalizeStatus(status) {
            const normalized = normalizeText(status).toUpperCase();

            if (Object.values(RESPONSE_STATUS).includes(normalized)) {
                return normalized;
            }

            return RESPONSE_STATUS.PENDING;
        }

        function buildResponseSection(status, isForeign) {
            if (status === RESPONSE_STATUS.PENDING) {
                return `
                    <div class="bloque-seccion bloque-claro" id="bloque-confirmacion">
                        <h3 class="subtitulo-elegante" style="color:var(--verde-oscuro);">
                            Confirmar Asistencia
                        </h3>

                        <div class="botones-confirmacion">
                            ${
                                isForeign
                                    ? `
                                        <button
                                            type="button"
                                            class="btn btn-confirmar"
                                            data-response-status="${RESPONSE_STATUS.CONFIRMED}"
                                        >
                                            Asistiré presencialmente
                                        </button>

                                        <button
                                            type="button"
                                            class="btn btn-confirmar"
                                            data-response-status="${RESPONSE_STATUS.VIRTUAL}"
                                        >
                                            Asistiré virtualmente
                                        </button>
                                    `
                                    : `
                                        <button
                                            type="button"
                                            class="btn btn-confirmar"
                                            data-response-status="${RESPONSE_STATUS.CONFIRMED}"
                                        >
                                            Confirmar asistencia
                                        </button>
                                    `
                            }

                            <button
                                type="button"
                                class="btn btn-no-asistir"
                                data-response-status="${RESPONSE_STATUS.REJECTED}"
                            >
                                No podré asistir
                            </button>
                        </div>
                    </div>
                `;
            }

            const stateContent = {
                [RESPONSE_STATUS.CONFIRMED]: {
                    icon: 'fa-check-circle',
                    title: '¡Asistencia confirmada!',
                    message: 'Tu respuesta fue registrada. ¡Te esperamos con mucho cariño!',
                    includeCalendar: true
                },
                [RESPONSE_STATUS.VIRTUAL]: {
                    icon: 'fa-video',
                    title: '¡Asistencia virtual confirmada!',
                    message: 'Tu respuesta fue registrada. Compartiremos el enlace de transmisión cuando esté disponible.',
                    includeCalendar: true
                },
                [RESPONSE_STATUS.REJECTED]: {
                    icon: 'fa-envelope',
                    title: 'Respuesta registrada',
                    message: 'Lamentamos que no puedas acompañarnos. Gracias por responder.',
                    includeCalendar: false
                }
            };

            const state = stateContent[status] || {
                icon: 'fa-check-circle',
                title: 'Respuesta registrada',
                message: 'Tu respuesta fue guardada correctamente.',
                includeCalendar: false
            };

            return `
                <div class="bloque-seccion bloque-claro">
                    <div class="ya-confirmado">
                        <i class="fas ${state.icon}" aria-hidden="true"></i>
                        <h3>${state.title}</h3>
                        <p>${state.message}</p>

                        ${
                            state.includeCalendar
                                ? `
                                    <button
                                        type="button"
                                        class="btn btn-calendario"
                                        data-action="download-calendar"
                                    >
                                        <i class="fas fa-calendar-plus" aria-hidden="true"></i>
                                        Agregar a mi calendario
                                    </button>
                                `
                                : ''
                        }
                    </div>
                </div>
            `;
        }

        function renderInvitation(data) {
            stopCountdown();

            const invitation = data.invitation;
            const familyMembers = Array.isArray(data.family_members)
                ? data.family_members
                : [];

            const primaryGuest = escapeHtml(
                normalizeText(invitation.primary_guest) || 'Invitado'
            );
            const status = normalizeStatus(invitation.group_status);
            const isForeign = Boolean(invitation.is_foreign);

            const familyHtml = familyMembers
                .map((member) => {
                    const name = escapeHtml(
                        normalizeText(member?.name) || 'Acompañante'
                    );

                    return `<li class="pase-item">${name}</li>`;
                })
                .join('');

            elements.invitationContent.innerHTML = `
                <div class="bloque-seccion bloque-oscuro">
                    <div class="contenedor-foto">
                        <img
                            src="https://torrealbaexio-prog.github.io/invitacion-boda/foto1.jpeg"
                            alt="Dayana y Exio"
                            class="foto-boda"
                            width="180"
                            height="180"
                            decoding="async"
                        >
                    </div>

                    <h1 class="nombres-novios">Dayana</h1>
                    <div class="ampersand">&amp;</div>
                    <h1 class="nombres-novios">Exio</h1>
                </div>

                <div class="divisor-dorado"></div>

                <div class="bloque-seccion bloque-claro">
                    <h2 class="texto-invitado">
                        ¡Hola, <span>${primaryGuest}</span>!
                    </h2>

                    <div class="versiculo">
                        “Si alguno prevalece contra el que está solo, dos estarán contra él,
                        pues cordón de tres dobleces no se rompe pronto.”
                        <span class="cita-versiculo">Eclesiastés 4:12</span>
                    </div>

                    <p class="introduccion-texto">
                        Hemos decidido unir nuestras vidas en matrimonio y nos llenaría
                        de alegría contar con su compañía. Invitamos a las siguientes
                        personas de su familia:
                    </p>

                    <div class="lista-pases-contenedor">
                        <ul id="lista-pases-dinamica">
                            <li class="pase-item">${primaryGuest}</li>
                            ${familyHtml}
                        </ul>
                    </div>

                    <p class="nota-aclaratoria">
                        * Cupos limitados. Velada exclusivamente para adultos.

        function bindInvitationActions(status) {
            elements.invitationContent

            if (status !== RESPONSE_STATUS.PENDING) {

                .querySelectorAll('[data-response-status]')

                    button.addEventListener('click', async () => {
                        const responseStatus = normalizeStatus(
                            button.dataset.responseStatus
                        );

                        if (responseStatus === RESPONSE_STATUS.REJECTED) {
                            const accepted = window.confirm(
                                '¿Confirmas que ninguna persona de este grupo podrá asistir?'
                            );

                            if (!accepted) {
                                return;
                            }

                            const familyResponses = getFamilyMembers().map(
                                (member) => ({
                                    id: String(member.id),
                                    is_attending: false
                                })
                            );

                            await submitResponse(
                                RESPONSE_STATUS.REJECTED,
                                familyResponses
                            );

                            return;
                        }

                        openConfirmationModal(responseStatus);
                    });
                });
        }

        // ==============================================================
        // MODAL DE CONFIRMACIÓN

        function getFamilyMembers() {
            return Array.isArray(invitationData?.family_members)
                ? invitationData.family_members.filter(
                    (member) => member && member.id !== undefined
                )
                : [];
        }

        function createCheckboxRow({
            id,
            name,
            checked = false,
            disabled = false,
            isPrimary = false
        }) {
            const row = document.createElement('div');
            row.className = 'checkbox-item';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = id;
            checkbox.checked = checked;
            checkbox.disabled = disabled;

            const label = document.createElement('label');
            label.htmlFor = id;
            label.textContent = name;

            if (isPrimary) {
                label.classList.add('nombre-principal');
            }

            row.append(checkbox, label);
            return row;
        }

        function openConfirmationModal(status) {
            pendingResponseStatus = status;
            lastFocusedElement = document.activeElement;

            const isVirtual = status === RESPONSE_STATUS.VIRTUAL;
            const primaryGuest =
                normalizeText(invitationData?.invitation?.primary_guest) ||
                'Invitado principal';

            elements.modalTitle.textContent = isVirtual
                ? 'Confirmar asistencia virtual'
                : 'Confirmar asistencia presencial';

            elements.modalMessage.textContent = isVirtual
                ? 'Selecciona las personas que participarán virtualmente.'
                : 'Selecciona las personas que asistirán presencialmente.';

            elements.modalInstruction.textContent =
                'El invitado principal está incluido automáticamente.';

            elements.modalList.replaceChildren();

            elements.modalList.appendChild(
                createCheckboxRow({
                    id: 'modal_check_principal',
                    name: `${primaryGuest} (invitado principal)`,
                    checked: true,
                    disabled: true,
                    isPrimary: true
                })
            );

            getFamilyMembers().forEach((member, index) => {
                const memberName =
                    normalizeText(member.name) || `Acompañante ${index + 1}`;
                const checkboxId = `modal_check_member_${index}`;

                const row = createCheckboxRow({
                    id: checkboxId,
                    name: memberName,
                    checked: member.is_attending === true
                });

                const checkbox = row.querySelector('input');
                checkbox.dataset.memberId = String(member.id);

                elements.modalList.appendChild(row);
            });

            elements.modalConfirmButton.disabled = false;
            elements.modalConfirmButton.innerHTML = isVirtual
                ? '<i class="fas fa-video" aria-hidden="true"></i> Confirmar asistencia virtual'
                : '<i class="fas fa-check" aria-hidden="true"></i> Confirmar asistencia';

            elements.modal.classList.add('activo');
            elements.modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            elements.modalCloseButton.focus();
        }

        function closeConfirmationModal() {
            if (isSubmitting) {
                return;
            }

            elements.modal.classList.remove('activo');
            elements.modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
            pendingResponseStatus = null;

            if (
                lastFocusedElement &&
                typeof lastFocusedElement.focus === 'function'
            ) {
                lastFocusedElement.focus();
            }
        }

        function collectModalResponses() {
            return Array.from(
                elements.modalList.querySelectorAll(
                    'input[type="checkbox"][data-member-id]'
                )
            ).map((checkbox) => ({
                id: checkbox.dataset.memberId,
                is_attending: checkbox.checked
            }));
        }

        async function handleModalConfirmation() {
            if (
                !pendingResponseStatus ||
                ![
                    RESPONSE_STATUS.CONFIRMED,
                    RESPONSE_STATUS.VIRTUAL
                ].includes(pendingResponseStatus)
            ) {
                showToast('No se seleccionó una respuesta válida.', 'error');
                return;
            }

            await submitResponse(
                pendingResponseStatus,
                collectModalResponses()
            );
        }

        // ==============================================================

        // ==============================================================
        function setResponseButtonsDisabled(disabled) {
            elements.invitationContent
                .querySelectorAll('[data-response-status]')
                .forEach((button) => {
                    button.disabled = disabled;
                });
        }

        async function submitResponse(status, responses) {
            if (isSubmitting) {
                return;
            }

            isSubmitting = true;
            setResponseButtonsDisabled(true);

            const originalButtonContent =
                elements.modalConfirmButton.innerHTML;

            if (elements.modal.classList.contains('activo')) {
                elements.modalConfirmButton.disabled = true;
                elements.modalConfirmButton.innerHTML =
                    '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Enviando...';
            }

            try {
                const payload = {
                    uuid: invitationId,
                    status,
                    responses: responses.map((response) => ({
                        id: String(response.id),
                        is_attending: Boolean(response.is_attending)
                    }))
                };

                await fetchJson(`${CONFIG.API_BASE}/api/public/respond`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                elements.modal.classList.remove('activo');
                elements.modal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';

                const successMessages = {
                    [RESPONSE_STATUS.CONFIRMED]:
                        'Tu asistencia presencial fue confirmada.',
                    [RESPONSE_STATUS.VIRTUAL]:
                        'Tu asistencia virtual fue confirmada.',
                    [RESPONSE_STATUS.REJECTED]:
                        'Tu respuesta fue registrada.'
                };

                showToast(
                    successMessages[status] ||
                        'Tu respuesta fue registrada correctamente.',
                    'success'
                );

                await loadInvitation({
                    showEnvelope: false
                });
            } catch (error) {
                let message = error.message;

                if (error.status === 409) {
                    message = 'Esta invitación ya fue respondida.';
                } else if (error.status === 410) {
                    message = 'Esta invitación ya expiró.';
                }

                showToast(message, 'error');
            } finally {
                isSubmitting = false;
                setResponseButtonsDisabled(false);
                elements.modalConfirmButton.disabled = false;
                elements.modalConfirmButton.innerHTML =
                    originalButtonContent;
            }
        }

        // ==============================================================
        // CONTADOR REGRESIVO
        // ==============================================================
        function stopCountdown() {
            if (countdownIntervalId !== null) {
                window.clearInterval(countdownIntervalId);
                countdownIntervalId = null;
            }
        }

        function startCountdown() {
            stopCountdown();

            const weddingTime = new Date(CONFIG.WEDDING_START).getTime();

            function updateCountdown() {
                const daysElement = document.getElementById('dias');
                const hoursElement = document.getElementById('horas');
                const minutesElement = document.getElementById('minutos');
                const secondsElement = document.getElementById('segundos');

                if (
                    !daysElement ||
                    !hoursElement ||
                    !minutesElement ||
                    !secondsElement
                ) {
                    stopCountdown();
                    return;
                }

                const difference = weddingTime - Date.now();

                if (difference <= 0) {
                    daysElement.textContent = '0';
                    hoursElement.textContent = '00';
                    minutesElement.textContent = '00';
                    secondsElement.textContent = '00';
                    stopCountdown();
                    return;
                }

                const days = Math.floor(
                    difference / (1000 * 60 * 60 * 24)
                );
                const hours = Math.floor(
                    (difference % (1000 * 60 * 60 * 24)) /
                        (1000 * 60 * 60)
                );
                const minutes = Math.floor(
                    (difference % (1000 * 60 * 60)) /
                        (1000 * 60)
                );
                const seconds = Math.floor(
                    (difference % (1000 * 60)) / 1000
                );

                daysElement.textContent = String(days);
                hoursElement.textContent = String(hours).padStart(2, '0');
                minutesElement.textContent = String(minutes).padStart(2, '0');
                secondsElement.textContent = String(seconds).padStart(2, '0');
            }

            updateCountdown();
            countdownIntervalId = window.setInterval(updateCountdown, 1000);
        }
